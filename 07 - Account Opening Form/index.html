<!DOCTYPE html>
<head>
    <title>Account Opening Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h1>Account Opening Form</h1>
        <form>
            <div class="form-grid">
                <!-- Personal Information Section -->
                <div class="column">
                    <h3>Personal Information</h3>
                    
                    <label>Full Name</label>
                    <input type="text" placeholder="Prefix">
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name">

                    <label>Date of Birth</label>
                    <input type="date">

                    <label>Mother's Maiden Name</label>
                    <input type="text" placeholder="Mother's Maiden Name">

                    <label>Telephone Number</label>
                    <input type="tel" placeholder="Enter a valid phone number">

                    <label>Email</label>
                    <input type="email" placeholder="example@example.com">

                    <label>Address</label>
                    <input type="text" placeholder="Street Address">
                </div>

                <!-- Account Information Section -->
                <div class="column">
                    <h3>Account Information</h3>

                    <label>Account Type</label>
                    <select>
                        <option>Select an account type</option>
                    </select>

                    <label>Account Category</label>
                    <select>
                        <option>Select an account category</option>
                    </select>

                    <label>Monthly Salary (in USD)</label>
                    <input type="number" placeholder="Enter your monthly salary">

                    <label>Date</label>
                    <input type="date">

                    <label>City</label>
                    <input type="text" placeholder="City">

                    <label>State/Province</label>
                    <input type="text" placeholder="State/Province">
                </div>
            </div>
            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>
</body>
</html>
