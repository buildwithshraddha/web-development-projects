<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nested Div Demo</title>
</head>
<body style="margin: 0;">
		<!-- Top Left Side Red Block-->
		<div style="width: 30%; height: 70vh; background-color: red; float: left;"></div>

		<!-- Top Right Side Block-->
		<div style="width: 70%; height: 70vh; float: left;">
			<div style="background-color: blue; width: 50%; height: 25%;  float: left;"></div>
			<div style="background-color: orange; width: 50%; height: 25%;  float: left;"></div>
			<div style="background-color: orange; width: 50%; height: 25%; float: left;"></div>
			<div style="background-color: blue; width: 50%; height: 25%;  float: left;"></div>
			<div style="background-color: black; width: 50%; height: 25%;  float: left;"></div>
			<div style="background-color: orange; width: 50%; height: 25%; float: left;"></div>
			<div style="background-color: orange; width: 50%; height: 25%; float: left;"></div>
			<div style="background-color: black; width: 50%; height: 25%;  float: left;"></div>
		</div>

		<!--Bottom Left Side purple Block-->
		<div style="width: 30%; height: 30vh; background-color: purple; float: left;"></div>

		<!--Bottom Right Side Block-->
		<div style="width: 70%; height: 30vh; float: left; ">

			<!--Green Section Upper -->
			<div style="background-color:green; width: 100%; height: 50%; ">
				<div style="background-color:white; width: 25%; float: left; height: 50%;margin-top:5% ;"></div>
				<div style="background-color:green; width: 25%; float: left; height: 50%;margin-top:5% ;"></div>
				<div style="background-color:white; width: 25%; float: left; height: 50%;margin-top:5% ;"></div>
				<div style="background-color:green; width: 25%; float: left; height: 50%;margin-top:5% ;"></div>
			</div>

			<!--DarkBlue Section Lower -->
			<div style="background-color:blue; width: 100%; height: 50%;">
				<div style="background-color:green; width: 25%; height: 50%; float: left;"></div>
				<div style="background-color:blue; width: 25%; height: 50%; float: left;"></div>
				<div style="background-color:green; width: 25%; height: 50%; float: left;"></div>
				<div style="background-color:blue; width: 25%; height: 50%; float: left;"></div>
			</div>
		</div>
</body>
</html>
