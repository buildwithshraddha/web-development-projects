<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nested table</title>
</head>
<body>
	<table border="1" cellspacing="0" cellpadding="35" width="100%" height="100%" style="border: 2px solid black;">
		<tr>
			<td colspan="6"></td>
			<td bgcolor="yellow"></td>
			<td colspan="3" rowspan="3"></td>
		</tr>

		<tr>
			<td colspan="3" bgcolor="yellow"></td>
			<td rowspan="2" bgcolor="yellow"></td>
			<td colspan="2" bgcolor="yellow"></td>
			<td bgcolor="yellow"></td>
		</tr>

		<tr>
			<td colspan="3" rowspan="2"></td>
			<td colspan="2"></td>
			<td bgcolor="yellow"></td>
		</tr>

		<tr>
			<td colspan="4" bgcolor="yellow"></td>
			<td colspan="3" bgcolor="yellow"></td>
		</tr>

		<tr>
			<td colspan="3"></td>
			<td bgcolor="yellow"></td>
			<td colspan="6"></td>
		</tr>		
	</table>
</body>
</html>
