<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosting Plans Table</title>
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="table-container">
    <table>

        <tr>
            <th class="blank"></th>
            <th>Smart Starter</th>
            <th>Smart Medium</th>
            <th>Smart Bussiness</th>
            <th>Smart Deluxe</th>
        </tr>

        <tr>
            <td class="feature">Super Space</td>
            <td>512 MB</td>
            <td>1 GB</td>
            <td>2 GB</td>
            <td>4 GB</td>
        </tr>

        <tr>
            <td class="feature">Bandwidth</td>
            <td>50 GB</td>
            <td>100 GB</td>
            <td>150 GB</td>
            <td>Unlimited</td>
        </tr>

        <tr>
            <td class="feature">My SQL Database</td>
            <td>Unlimited</td>
            <td>Unlimited</td>
            <td>Unlimited</td>
            <td>Unlimited</td>
        </tr>

        <tr>
            <td class="feature">Setup</td>
            <td>19.90$</td>
            <td>12.90$</td>
            <td>Free</td>
            <td>Free</td>
        </tr>

        <tr>
            <td class="feature">PHP 5</td>
            <td><span class="tick"><ion-icon name="checkmark-outline"></ion-icon></span></td>
            <td><span class="tick"><ion-icon name="checkmark-outline"></ion-icon></span></td>
            <td><span class="tick"><ion-icon name="checkmark-outline"></ion-icon></span></td>
            <td><span class="tick"><ion-icon name="checkmark-outline"></ion-icon></span></td>
        </tr>

        <tr>
            <td class="feature">Ruby On Rails</td>
            <td><span class="tick"><ion-icon name="checkmark-outline"></ion-icon></span></td>
            <td><span class="tick"><ion-icon name="checkmark-outline"></ion-icon></span></td>
            <td><span class="tick"><ion-icon name="checkmark-outline"></ion-icon></span></td>
            <td><span class="tick"><ion-icon name="checkmark-outline"></ion-icon></span></td>
        </tr>

        <tr>
            <td class="price-label">Price Per month</td>
            <td class="price">$ 2.90</td>
            <td class="price">$ 5.90</td>
            <td class="price">$ 9.90</td>
            <td class="price">$ 14.90</td>
        </tr>

    </table>
</div>

</body>
</html>
