<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Price List</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Product Price List</h1>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>
                    <i class="fa-solid fa-mobile-screen-button product-icon"></i>
                    Smartphone
                </td>
                <td>Electronics</td>
                <td>₹6999</td>
            </tr>

            <tr>
                <td>
                    <i class="fa-solid fa-laptop product-icon"></i>
                    Laptop
                </td>
                <td>Electronics</td>
                <td>₹9999</td>
            </tr>

            <tr>
                <td>
                    <i class="fa-solid fa-headphones product-icon"></i>
                    Headphones
                </td>
                <td>Accessories</td>
                <td>₹500</td>
            </tr>

            <tr>
                <td>
                    <i class="fa-regular fa-clock product-icon"></i>
                    Digital Clock
                </td>
                <td>Wearables</td>
                <td>₹249</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
